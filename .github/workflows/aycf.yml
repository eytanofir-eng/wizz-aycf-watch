name: Wizz AYCF watch

# Scheduling is driven externally by cron-job.org, which fires this workflow
# every ~5 min via the GitHub API (workflow_dispatch). GitHub's own `schedule:`
# cron was removed because it's unreliable for short intervals — it silently
# drops runs at :00/:05/... under global load.
on:
  workflow_dispatch:      # external cron-job.org trigger + manual "Run workflow" button
    inputs:
      force_check:
        description: "Check all routes even if none are in-window (full test run)"
        type: boolean
        default: false

# If a run is still going when the next fires, skip the new one rather than pile up.
concurrency:
  group: aycf-watch
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Fast pre-flight gate (stdlib only, no browser): is any route in its
      # 72h-3h window right now? If not, the heavy steps below are skipped and
      # the run finishes in seconds.
      - name: Booking-window gate
        id: gate
        run: |
          if [ "${{ github.event.inputs.force_check }}" = "true" ]; then
            echo "Forced run — bypassing window gate."
            echo "open=true" >> "$GITHUB_OUTPUT"
          elif python aycf_window.py; then
            echo "open=true" >> "$GITHUB_OUTPUT"
          else
            echo "open=false" >> "$GITHUB_OUTPUT"
          fi

      # Cache pip + the Playwright browser download across runs.
      - uses: actions/cache@v4
        if: steps.gate.outputs.open == 'true'
        with:
          path: |
            ~/.cache/pip
            ~/.cache/ms-playwright
          key: aycf-deps-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        if: steps.gate.outputs.open == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      # Restore notify-once state from the most recent previous run so we don't
      # re-alert every 5 minutes while a flight stays available. The unique key
      # (run_id) always writes a fresh cache; restore-keys pulls the latest one.
      - name: Restore notify state
        if: steps.gate.outputs.open == 'true'
        uses: actions/cache@v4
        with:
          path: state.json
          key: aycf-state-${{ github.run_id }}
          restore-keys: |
            aycf-state-

      - name: Run watcher
        if: steps.gate.outputs.open == 'true'
        env:
          WIZZ_EMAIL: ${{ secrets.WIZZ_EMAIL }}
          WIZZ_PASSWORD: ${{ secrets.WIZZ_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_ID_YUVAL: ${{ secrets.TELEGRAM_CHAT_ID_YUVAL }}
        run: python check_aycf.py ${{ github.event.inputs.force_check == 'true' && '--no-window' || '' }}
